name: Preflight

on:
  workflow_call:
    inputs:
      version:
        description: 'Optional release version to assert, with or without v prefix (e.g., v1.0.0)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            preflightArgs: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            preflightArgs: ''
          - platform: 'ubuntu-22.04-arm'
            preflightArgs: ''
          - platform: 'windows-latest'
            preflightArgs: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Assert release version
        if: inputs.version != ''
        run: node scripts/assert-release-version.js "${{ inputs.version }}"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: preflight-${{ matrix.platform }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Rust format check
        run: bun run rust:fmt:check

      - name: Rust clippy
        run: bun run rust:clippy

      - name: Frontend tests
        run: bun run test:run

      - name: Rust tests
        run: bun run rust:test

      - name: Build Tauri app without bundling
        run: bun run tauri build ${{ matrix.preflightArgs }} --no-bundle --ci
